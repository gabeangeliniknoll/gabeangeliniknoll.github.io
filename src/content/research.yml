page: Research
pageDescription: My work focuses on invariants of ring spectra that shed light on arithmetic and geometry. 
sections: 
    - title: Published Papers
      papers: 
        - title: Complex orientations of TP of complete DVRs
          description: I give an explicit description of the height one formal group law associated to TP of a ring of integers in a local field over a certain base ring.
          links:
            - display: arXiv
              url: https://arxiv.org/abs/2104.07306
