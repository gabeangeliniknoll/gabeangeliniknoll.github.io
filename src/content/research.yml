              sep: "."
              start: "Published in "
        - title: Detecting beta elements in iterated algebraic K-theory of finite fields
          description: I prove that a certain family of beta elements is detected in iterated algebraic K-theory of finite fields and consequently iterated algebraic K-theory of the integers. This gives evidence for a higher chromatic height version of a conjecture of Lichtenbaum. This also suggests a new approach to studying the redshift conjectures of Ausoni-Rognes.
          links:
