    - title: In progress
      papers:
        - title: A deformation of Borel equivariant homotopy
          description: We construct a deformation of the Borel G-equivariant stable homotopy category that recovers the a-complete Artin-Tate real motivic stable homotopy category of Burkland-Hahn-Senger. 
          coauthors:  
            - name: Mark Behrens
              url: https://www3.nd.edu/~mbehren1/
              sep: ", " 
              start: "Joint with "
            - name: Eva Belmont
              url: https://mathweb.ucsd.edu/~ebelmont/
              sep: ", and" 
              start: ""
            - name: Hana Jia Kong
              url: https://hanajiakong.github.io/
              sep: "." 
              start: ""
        - title: Syntomic cohomology of Morava K-theory
          description: We compute the syntomic cohomology of any MU-algebra form of truncated Brown-Petrson spectra and connective Morava K-theory. As applications, we prove the telescope conjecture and the Ausoni-Rognes-Lichtenbaum-Quillen conjecture holds for algebraic K-theory of these truncated Brown--Peterson spectra and Morava K-theory. 
          coauthors:
            - name: Jeremy Hahn
              url: https://web.mit.edu/~jhahn01/www/
              sep: "."
              start: "Joint with "
        - title: Homology of twisted G-rings
          description: We construct a variant of topological Hochschild homology associated to any crossed simplicial group. The input of this construction is a twisted G-ring, which generalizes the notion of a ring with anti-involution. We compute this in the case of twisted G-monoid rings. 
          coauthors:  
            - name: Mona Merling
              url: https://www.math.upenn.edu/~mmerling/
              sep: " and" 
              start: "Joint with "
            - name: Maximilien Peroux
              url: https://www.maximilienperoux.com/
              sep: "." 
              start: ""
        - title: Algebraic K-theory of real topological K-theory 
          description: We compute algebraic K-theory of real topological K-theory after smashing with a finite complex at the prime 2 using syntomic cohomology. 
          coauthors:
            - name: Christian Ausoni
              url: https://www.math.univ-paris13.fr/~ausoni/
              sep: " and "
              start: "Joint with "
            - name: John Rognes 
              url: https://www.mn.uio.no/math/personer/vit/rognes/
              sep: "."
              start: ""
        - title: Real syntomic cohomology 
          description: We study even filtrations in equivariant homotopy theory with applications to Real topological cyclic homology. In particular, we provide constructions of Real syntomic cohomology and Real prismatic cohomology. As an application, we study Real topological cyclic homology of Real topological K-theory.  
          coauthors:
            - name: Mike Hill
              url: https://www.math.ucla.edu/~mikehill/
