        - title: Real Topological Hochschild homology via the norm and Real Witt vectors
          description: We interpret Real topological Hochschild homology as the norm for the orthogonal group of two-by-two-matrices. We then prove a multiplicative double coset formula. Using this we define Real Hochschild homology and Witt vectors for rings with anti-involution. 
          coauthors:  
            - name: Teena Gerhardt
              url: https://users.math.msu.edu/users/teena/Home.html
              sep: " and" 
