              url: https://arxiv.org/abs/2111.06970
        - title: Topological Hochschild homology of the second truncated Brown-Peterson spectrum I
          description: We compute topological Hochschild homology of forms of the second truncated Brown-Peterson spectrum with coefficients in connective Morava K-theory. We also compute topological Hochschild homology of forms of arbitrary truncated Brown-Peterson spectra with coefficients in the p-local integers.
          coauthors: 
            - name: Dominic Culver
              url: https://dlculver.github.io/
              sep: " and" 
              start: "Joint with "
            - name: Eva Höning
              url: https://evahoening.netlify.app
              sep: "."
              start: ""
          links:
            - display: arXiv
              url: https://arxiv.org/abs/2106.06785
        - title: Chromatic complexity of algebraic K-theory of y(n)
          description: We compute Morava K-theory of topological periodic cyclic homology and topological negative cyclic homology of the Thom spectra y(n). This gives evidence for a version of the red-shift conjecture for topological periodic cyclic homology at all chromatic heights. 
          coauthors: 
            - name: J.D. Quigley
              url: https://quigleyjd.github.io/
              sep: "." 
              start: "Joint with "
          links:
            - display: arXiv
              url: https://arxiv.org/abs/1908.09164
              # body:
